<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0d1019">
    <title>ورود به پنل مدیریت کلینیک</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <main class="login-shell">
        <section class="login-card" id="loginCard" aria-labelledby="loginTitle">
            <header class="login-header">
                <div class="login-brand-mark" aria-hidden="true">
                    <i class="fas fa-tooth"></i>
                </div>
                <h1 id="loginTitle">پنل مدیریت کلینیک دندانپزشکی</h1>
                <p>سامانه یکپارچه پایش وضعیت بیماران و کنترل دسترسی‌ها</p>
            </header>

            <div id="errorAlert" class="login-alert" role="alert" aria-live="assertive" hidden>
                <i class="fas fa-circle-exclamation" aria-hidden="true"></i>
                <span id="errorMessage">نام کاربری یا کلمه عبور اشتباه است</span>
            </div>

            <form id="loginForm" class="login-form" novalidate>
                <div class="login-field">
                    <label for="username">شماره تماس</label>
                    <div class="login-input-shell">
                        <i class="fas fa-phone login-input-icon" aria-hidden="true"></i>
                        <input type="tel" id="username" class="login-input" placeholder="مثال: 09337593737" required inputmode="numeric" autocomplete="username" dir="ltr" aria-describedby="errorMessage">
                    </div>
                </div>

                <div class="login-field">
                    <label for="password">کلمه عبور</label>
                    <div class="login-input-shell">
                        <i class="fas fa-lock login-input-icon" aria-hidden="true"></i>
                        <input type="password" id="password" class="login-input" placeholder="کلمه عبور را وارد کنید" required autocomplete="current-password" aria-describedby="errorMessage">
                        <button class="password-toggle" id="passwordToggle" type="button" aria-label="نمایش کلمه عبور" aria-pressed="false">
                            <i class="fas fa-eye" aria-hidden="true"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="login-submit" id="submitBtn" aria-busy="false">
                    <span id="btnText">ورود به پنل مدیریت</span>
                    <span class="spinner" id="btnSpinner" aria-hidden="true"></span>
                </button>
            </form>
        </section>
        <p class="login-footer">پورتال مدیریت مطب دندانپزشکی © ۲۰۲۶</p>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabaseClient.js"></script>
    <script src="js/database.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
